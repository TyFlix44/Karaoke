<!DOCTYPE html>
<html lang="en" style="height: 100%; margin: 0;">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra KTV Landscape Edition</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0d0e12;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        /* Custom scrollbar structure */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.24);
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 8px rgba(16, 185, 129, 0.3); }
            50% { box-shadow: 0 0 16px rgba(16, 185, 129, 0.6); }
        }
        @keyframes jumpWave {
            0%, 100% { height: 30%; }
            50% { height: 100%; }
        }
        .animate-jump {
            animation: jumpWave 1.2s infinite ease-in-out;
        }
    </style>
</head>
<body class="flex flex-row h-full w-full select-none relative">

    <!-- FLOATING EXIT/CLOSE FULL SCREEN BUTTON (Visible only in Full Screen Mode) -->
    <button id="exitCustomFullscreenBtn" class="fixed top-4 right-24 z-[9999] hidden bg-gradient-to-r from-red-500 to-pink-600 hover:from-red-600 hover:to-pink-700 text-white font-black text-xs px-5 py-3 rounded-full shadow-2xl shadow-pink-500/35 cursor-pointer items-center gap-2 transform active:scale-95 transition-all">
       <span class="text-sm font-black">✕</span> CLOSE FULL SCREEN
    </button>

    <!-- LEFT SIDEBAR PANEL (Playlist management and list. Width: 38%) -->
    <aside class="w-[38%] h-full bg-[#0F1115] border-r border-white/5 flex flex-col p-4 box-border">
        
        <!-- Logo Header -->
        <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-emerald-500 flex items-center justify-center text-xl shadow-lg shadow-blue-500/20">
                🎤
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-tight text-white leading-tight uppercase">TYFLIX TV</h1>
                <p id="ktvSubtitle" class="text-[10px] text-emerald-400 font-bold tracking-[0.2em] uppercase">KARAOKE 🎤</p>
            </div>
        </div>

        <!-- Search Input Box -->
        <div class="relative w-full mb-3">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Connecting to Playlists..." 
                class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-3 py-2 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors"
            />
            <span class="absolute left-3.5 top-2.5 text-slate-500 text-sm">🔍</span>
        </div>

        <!-- Tab Selectors (Popular & Reserved) -->
        <nav class="flex gap-2 mb-3">
            <button id="tabPopular" class="flex-1 py-2 rounded-2xl bg-blue-600 text-white text-xs font-bold shadow-lg shadow-blue-600/30 transition-all cursor-pointer">
                🔥 Popular
            </button>
            <button id="tabReserved" class="flex-1 py-2 rounded-2xl bg-white/5 text-slate-400 text-xs font-bold relative transition-all cursor-pointer hover:bg-white/10 flex justify-center items-center gap-2">
                🎵 Reserved
                <span id="reservedBadge" class="w-5 h-5 bg-emerald-500 text-black text-[10px] font-black rounded-full hidden items-center justify-center border border-black">0</span>
            </button>
        </nav>

        <!-- Dynamic list of tracks -->
        <div class="flex-1 overflow-y-auto pr-1">
            <div id="songList" class="flex flex-col gap-2 pb-4">
                <div class="text-center py-12 text-slate-500 text-xs flex flex-col items-center justify-center gap-2">
                    <span class="animate-spin text-lg">⏳</span>
                    Connecting to YouTube Playlist API...
                </div>
            </div>
        </div>

    </aside>

    <!-- RIGHT MAIN PANEL (Video Screen and Footer controls. Width: 62%) -->
    <main class="w-[62%] h-full flex flex-col bg-[#08090C] box-border relative">
        
        <!-- Interactive Clock Overlay (Status simulation) -->
        <div class="absolute top-3 right-5 z-20 flex gap-4 items-center text-[11px] font-semibold text-white/50 bg-black/40 px-3 py-1 rounded-full backdrop-blur-sm pointer-events-none">
            <span id="clock">12:00 PM</span>
            <div class="flex gap-1 items-center">
                <span class="text-[9px] bg-white/10 px-1 rounded-sm border border-white/20">5G</span>
                <div class="w-5 h-2.5 rounded-sm border border-white/30 relative">
                    <div class="absolute left-0.5 top-0.5 h-1 w-3.5 bg-emerald-400 rounded-2xs"></div>
                </div>
            </div>
        </div>

        <!-- Active Player Section -->
        <section class="flex-1 bg-black relative overflow-hidden flex items-center justify-center">
            
            <!-- YouTube embed container -->
            <div id="youtubePlayerContainer" class="absolute inset-0 w-full h-full hidden">
                <iframe id="ytPlayer" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>

            <!-- Music Hero stage placeholder -->
            <div id="playerPlaceholder" class="absolute inset-0 bg-cover bg-center opacity-30 grayscale-[0.2]" style="background-image: url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&q=80&w=1200');"></div>
            
            <div id="playerControlsOverlay" class="relative z-10 flex flex-col items-center gap-3 p-6 text-center">
                <button id="mainPlayBtn" class="w-16 h-16 rounded-full bg-blue-600 flex items-center justify-center shadow-2xl active:scale-95 transition-transform cursor-pointer">
                    <div class="w-0 h-0 border-t-[10px] border-t-transparent border-l-[18px] border-l-white border-b-[10px] border-b-transparent ml-1"></div>
                </button>
                <div class="bg-black/85 backdrop-blur-md px-5 py-2.5 rounded-full border border-white/10 max-w-sm">
                    <p id="nowPlayingText" class="text-xs font-bold tracking-wide text-emerald-400 truncate">No Song Selected</p>
                </div>
                <p class="text-[11px] text-white/40 font-medium">Select any title from the list to start karaoke playback.</p>
            </div>

            <!-- Live premium status visualizers (Only visible when playing) -->
            <div id="playbackUiOverlay" class="absolute inset-0 pointer-events-none flex flex-col justify-between p-4 hidden z-10 box-border">
                <div class="flex justify-between items-center w-full">
                    <span class="bg-emerald-500/15 border border-emerald-500 text-emerald-400 px-2.5 py-1 rounded-full text-[10px] font-black uppercase tracking-wider shadow-[0_0_10px_rgba(16,185,129,0.3)] animate-pulse flex items-center gap-1.5 leading-none">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgb(52,211,153)]"></span>
                        Karaoke Flowing
                    </span>
                    <span class="text-[10px] font-black tracking-widest text-[#ec4899] uppercase pr-20">Live Studio Engine</span>
                </div>
              

        </section>

        <!-- Footer Control interface panel -->
        <footer class="p-3 bg-[#121318] border-t border-white/5 flex items-center justify-between gap-4 select-none box-border">
            <div class="flex gap-2 flex-1">
                <button id="controlStop" class="flex-1 h-11 rounded-xl bg-white/5 hover:bg-white/10 active:scale-95 transition-all flex flex-col items-center justify-center cursor-pointer">
                    <span class="text-base leading-none">⏹</span>
                    <span class="text-[8px] font-black uppercase tracking-tight text-slate-400 mt-1">Stop</span>
                </button>
                <button id="controlPlay" class="flex-1 h-11 rounded-xl bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all flex flex-col items-center justify-center cursor-pointer">
                    <span class="text-base leading-none">▶</span>
                    <span class="text-[8px] font-black uppercase tracking-tight text-white mt-1">Play</span>
                </button>
                <button id="controlNext" class="flex-1 h-11 rounded-xl bg-white/5 hover:bg-white/10 active:scale-95 transition-all flex flex-col items-center justify-center cursor-pointer">
                    <span class="text-base leading-none">⏩</span>
                    <span class="text-[8px] font-black uppercase tracking-tight text-slate-400 mt-1">Next / Skip</span>
                </button>
            </div>
            <button id="controlFullscreen" class="w-11 h-11 rounded-xl bg-emerald-500/10 hover:bg-emerald-500/20 active:scale-95 transition-all flex items-center justify-center border border-emerald-500/20 cursor-pointer" title="Go Fullscreen">
                <span class="text-emerald-400 text-base leading-none">🖥</span>
            </button>
        </footer>

    </main>

    <!-- Modal dialogue overlay -->
    <div id="optionModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-50 p-4">
        <div class="w-full max-w-sm rounded-3xl bg-gradient-to-b from-[#16171d] to-[#0c0d12] border border-white/10 p-6 flex flex-col text-center shadow-2xl">
            <h2 class="text-base font-black text-white mb-2 tracking-wide uppercase">🎤 KTV Selection Mode</h2>
            <p id="modalSongTitle" class="text-xs text-slate-400 mb-6 font-medium line-clamp-3 leading-relaxed px-2"></p>
            <div class="flex gap-3 mb-3">
                <button id="modalPlayBtn" class="flex-1 py-3 bg-[#10b981] text-[#090a0f] text-xs font-black rounded-xl cursor-pointer hover:bg-emerald-400 active:scale-95 transition-all">▶ PLAY NOW</button>
                <button id="modalReserveBtn" class="flex-1 py-3 bg-blue-600 text-white text-xs font-black rounded-xl cursor-pointer hover:bg-blue-500 active:scale-95 transition-all">🎵 RESERVE</button>
            </div>
            <button id="modalCancelBtn" class="py-2.5 bg-white/5 text-slate-400 text-xs font-bold rounded-xl cursor-pointer hover:bg-white/10 active:scale-95 transition-all">Cancel</button>
        </div>
    </div>

    <!-- Live script engine -->
    <script>
      const API_KEY = "AIzaSyBtF0Mr_WrEMl38sUr_eVPpHSg6mUf1GJs";
      
      const PLAYLISTS = [
    "PLhZqm6oOykiewzZZNAc4e9Z2MW9QXCfJX",
    "PLZScFt810axC-8uoF4geaTAcSHaUAP_ZT",
    "PL8D4Iby0Bmm94U_rwuJuocyC1xFoPTd5R"
];

      
          

        
          

      let allSongs = [];
      let reservedSongs = [];
      let activeIndex = -1;
      let currentPlayingVid = null;
      let currentPlayingTitle = "";
      let activeTab = "popular";
      let selectedModalSong = null;
      let isSimulatedFullscreen = false;

      let currentPage = 1;
      const songsPerPage = 100;

      const songListContainer = document.getElementById("songList");
      const modal = document.getElementById("optionModal");
      const modalCancel = document.getElementById("modalCancelBtn");
      const modalPlay = document.getElementById("modalPlayBtn");
      const modalReserve = document.getElementById("modalReserveBtn");
      const modalTitle = document.getElementById("modalSongTitle");
      const ytPlayer = document.getElementById("ytPlayer");
      const playerContainer = document.getElementById("youtubePlayerContainer");
      const playerPlaceholder = document.getElementById("playerPlaceholder");
      const playerControlCenter = document.getElementById("playerControlsOverlay");
      const playbackUiOverlay = document.getElementById("playbackUiOverlay");
      const nowPlayingText = document.getElementById("nowPlayingText");
      const badge = document.getElementById("reservedBadge");
      const marqueeText = document.getElementById("marqueeText");
      const exitFullscreenBtn = document.getElementById("exitCustomFullscreenBtn");

      function updateClock() {
        const d = new Date();
        document.getElementById("clock").innerText = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true});
      }
      setInterval(updateClock, 1000);
      updateClock();

      async function loadPlaylistItems() {
        const subtitle = document.getElementById("ktvSubtitle");
        const searchInput = document.getElementById("searchInput");
        
        songListContainer.innerHTML = `
          <div class="text-center py-12 text-slate-500 text-xs flex flex-col items-center justify-center gap-2">
            <span class="animate-spin text-lg">⏳</span>
            <span class="font-bold text-slate-300">Connecting to live KTV streams...</span>
            <span class="text-[9px] text-slate-600 font-normal">Compiling 5,000+ tracks dynamically from your playlists.</span>
          </div>`;

        allSongs = [];
        let loadedSongsMap = new Map();
        let tokens = {};
        
        for (const playlistId of PLAYLISTS) {
          try {
            let nextToken = await fetchPlaylistPage(playlistId, null, loadedSongsMap);
            tokens[playlistId] = nextToken;
          } catch (e) {
            console.error("Initial playlist item pull failed for " + playlistId, e);
          }
        }

        if (allSongs.length === 0) {
          console.warn("YouTube API down. Initializing backup engine.");
          allSongs = generateHugeDatabase();
          if (subtitle) {
              subtitle.innerText = allSongs.length + " OFFLINE TRACKS";
          }
          if (searchInput) {
              searchInput.placeholder = "Search " + allSongs.length + "+ karaoke songs...";
          }
          renderSongs();
          return;
        }

        if (subtitle) {
          subtitle.innerText = "STREAMING " + allSongs.length + " TRACKS...";
          subtitle.className = "text-[10px] text-blue-400 font-bold tracking-widest uppercase animate-pulse";
        }
        if (searchInput) {
          searchInput.placeholder = "Search " + allSongs.length + "+ songs...";
        }
        renderSongs();

        loadRemainingPages(tokens, loadedSongsMap);
      }

      async function fetchPlaylistPage(playlistId, pageToken, loadedSongsMap) {
        let url = "https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=" + playlistId + "&key=" + API_KEY;
        if (pageToken) {
          url += "&pageToken=" + pageToken;
        }

        const response = await fetch(url);
        if (!response.ok) {
          throw new Error("HTTP status " + response.status);
        }
        
        const data = await response.json();
        if (data.items && data.items.length > 0) {
          data.items.forEach((item) => {
            const vidId = item.snippet?.resourceId?.videoId;
            const title = item.snippet?.title || "Unknown Track";
            
            if (vidId && !title.toLowerCase().includes("deleted") && !title.toLowerCase().includes("private") && !title.toLowerCase().includes("untitled")) {
              if (!loadedSongsMap.has(vidId)) {
                loadedSongsMap.set(vidId, true);
                allSongs.push({
                  id: vidId,
                  title: title,
                  index: allSongs.length + 1
                });
              }
            }
          });
        }
        return data.nextPageToken || null;
      }

      async function loadRemainingPages(tokens, loadedSongsMap) {
        const subtitle = document.getElementById("ktvSubtitle");
        const searchInput = document.getElementById("searchInput");

        for (const playlistId of PLAYLISTS) {
          let nextPageToken = tokens[playlistId];
          while (nextPageToken) {
            try {
              nextPageToken = await fetchPlaylistPage(playlistId, nextPageToken, loadedSongsMap);
              
              if (subtitle) {
                subtitle.innerText = "STREAMING " + allSongs.length + " TRACKS...";
              }
              if (searchInput) {
                searchInput.placeholder = "Search " + allSongs.length + "+ songs...";
              }
              
              if (!searchInput.value) {
                renderSongs();
              }
              
              await new Promise(resolve => setTimeout(resolve, 80));
            } catch (e) {
              console.error("Background loading cycle interrupted for: " + playlistId, e);
              break;
            }
          }
        }

        if (subtitle) {
          subtitle.innerText = allSongs.length + " TRACKS ONLINE";
          subtitle.className = "text-[10px] text-emerald-400 font-bold tracking-[0.2em] uppercase";
        }
        if (searchInput) {
          searchInput.placeholder = "Search " + allSongs.length + " karaoke songs...";
        }
      }

      function renderSongs() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        let listToRender = activeTab === "popular" ? allSongs : reservedSongs;
        
        if (query) {
          listToRender = listToRender.filter(s => s.title.toLowerCase().includes(query));
        }

        songListContainer.innerHTML = "";
        
        if (listToRender.length === 0) {
          songListContainer.innerHTML = '<div class="text-center py-12 text-slate-500 text-xs font-semibold">No tracks found.</div>';
          return;
        }

        const totalItems = listToRender.length;
        const totalToShow = Math.min(currentPage * songsPerPage, totalItems);
        const listSlice = listToRender.slice(0, totalToShow);

        listSlice.forEach((song) => {
          let isCurrentInPlay = (currentPlayingVid === song.id);
          const isReserved = reservedSongs.some(r => r.id === song.id);
          
          const card = document.createElement("div");
          
          if (isCurrentInPlay) {
            card.className = "flex items-center gap-3 p-2.5 rounded-2xl bg-blue-600/15 border border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.25)] cursor-pointer transition-all";
          } else {
            card.className = "flex items-center gap-3 p-2.5 rounded-2xl bg-white/[0.03] border border-transparent cursor-pointer hover:bg-white/[0.07] hover:border-white/5 active:scale-98 transition-all";
          }
          
          const indexBoxStyle = isCurrentInPlay 
            ? "bg-blue-600 text-white font-black" 
            : "bg-white/5 text-slate-500 font-bold";
          
          card.innerHTML = '<div class="w-9 h-9 rounded-xl ' + indexBoxStyle + ' flex items-center justify-center text-[10px] shrink-0">' + String(song.index).padStart(2, '0') + '</div><div class="flex-1 min-w-0"><h3 class="text-xs font-bold leading-tight truncate ' + (isCurrentInPlay ? 'text-blue-400' : 'text-slate-200') + '">' + song.title + '</h3><p class="text-[9px] text-slate-500 font-medium mt-0.5">YouTube Playlist Karaoke Track</p></div><div class="flex items-center gap-1.5 shrink-0">' + (isReserved ? '<span class="px-1.5 py-0.5 bg-emerald-500 text-black text-[8px] font-black rounded uppercase tracking-wider scale-90">Reserved</span>' : '') + '<div class="' + (isCurrentInPlay ? 'text-blue-400 animate-pulse' : 'text-slate-600') + ' text-xs">▶</div></div>';
          
          card.onclick = () => {
            showActionModal(song);
          };
          
          songListContainer.appendChild(card);
        });

        if (totalToShow < totalItems) {
           const loadMoreBtn = document.createElement("button");
           loadMoreBtn.className = "w-full py-2.5 mt-2 bg-white/5 hover:bg-white/10 active:scale-95 text-white text-xs font-black rounded-xl transition-all cursor-pointer border border-white/5";
           loadMoreBtn.innerText = "➕ Load More Tracks (" + (totalItems - totalToShow) + " remaining)";
           loadMoreBtn.onclick = (e) => {
              e.stopPropagation();
              currentPage++;
              renderSongs();
           };
           songListContainer.appendChild(loadMoreBtn);
        }
      }

      function showActionModal(song) {
        selectedModalSong = song;
        modalTitle.innerText = song.title;
        modal.classList.remove("hidden");
        modal.classList.add("flex");
      }

      function hideModal() {
        modal.classList.remove("flex");
        modal.classList.add("hidden");
        selectedModalSong = null;
      }

      modalCancel.onclick = hideModal;

      modalPlay.onclick = () => {
        if (selectedModalSong) {
          playVideo(selectedModalSong.id, selectedModalSong.title);
          reservedSongs = reservedSongs.filter(r => r.id !== selectedModalSong.id);
          updateReservedBadge();
        }
        hideModal();
        renderSongs();
      };

      modalReserve.onclick = () => {
        if (selectedModalSong) {
          if (!reservedSongs.some(r => r.id === selectedModalSong.id)) {
            reservedSongs.push(selectedModalSong);
            updateReservedBadge();
          }
        }
        hideModal();
        renderSongs();
      };

      function updateReservedBadge() {
        if (reservedSongs.length > 0) {
          badge.innerText = reservedSongs.length;
          badge.classList.remove("hidden");
          badge.classList.add("flex");
        } else {
          badge.classList.add("hidden");
        }
      }

      function playVideo(vidId, title) {
        currentPlayingVid = vidId;
        currentPlayingTitle = title;
        nowPlayingText.innerText = title;
        
        ytPlayer.src = "https://www.youtube.com/embed/" + vidId + "?autoplay=1&enablejsapi=1&rel=0&fs=1&controls=1&origin=https://www.youtube.com&playsinline=1";
        
        playerContainer.classList.remove("hidden");
        playerPlaceholder.classList.add("hidden");
        playerControlCenter.classList.add("hidden");
        playbackUiOverlay.classList.remove("hidden");
        
        renderSongs();
      }

      function stopVideo() {
        ytPlayer.src = "about:blank";
        currentPlayingVid = null;
        currentPlayingTitle = "";
        
        playerContainer.classList.add("hidden");
        playerPlaceholder.classList.remove("hidden");
        playerControlCenter.classList.remove("hidden");
        playbackUiOverlay.classList.add("hidden");
        
        nowPlayingText.innerText = "No Song Selected";
        renderSongs();
      }

      function toggleFullScreenMode(enable) {
         isSimulatedFullscreen = enable;
         const panelAside = document.querySelector("aside");
         const panelMain = document.querySelector("main");
         
         if (enable) {
            panelAside.classList.add("hidden");
            panelMain.classList.replace("w-[62%]", "w-full");
            exitFullscreenBtn.classList.remove("hidden");
            exitFullscreenBtn.classList.add("flex");
            
            try {
                const b = document.documentElement;
                if (b.requestFullscreen) b.requestFullscreen();
                else if (b.webkitRequestFullscreen) b.webkitRequestFullscreen();
            } catch(e) {
                console.log("Standard system screen maximize triggered");
            }
         } else {
            panelAside.classList.remove("hidden");
            panelMain.classList.replace("w-full", "w-[62%]");
            exitFullscreenBtn.classList.add("hidden");
            exitFullscreenBtn.classList.remove("flex");
            
            try {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            } catch(e) {
                console.log("Standard system screen minimize triggered");
            }
         }
      }

      exitFullscreenBtn.onclick = () => {
         toggleFullScreenMode(false);
      };

      document.getElementById("tabPopular").onclick = () => {
        activeTab = "popular";
        currentPage = 1;
        document.getElementById("tabPopular").className = "flex-1 py-2 rounded-2xl bg-blue-600 text-white text-xs font-bold shadow-lg shadow-blue-600/30 transition-all cursor-pointer";
        document.getElementById("tabReserved").className = "flex-1 py-2 rounded-2xl bg-white/5 text-slate-400 text-xs font-bold relative transition-all cursor-pointer hover:bg-white/10 flex justify-center items-center gap-2";
        renderSongs();
      };

      document.getElementById("tabReserved").onclick = () => {
        activeTab = "reserved";
        currentPage = 1;
        document.getElementById("tabPopular").className = "flex-1 py-2 rounded-2xl bg-white/5 text-slate-400 text-xs font-bold transition-all cursor-pointer hover:bg-white/10";
        document.getElementById("tabReserved").className = "flex-1 py-2 rounded-2xl bg-blue-600 text-white text-xs font-bold relative transition-all cursor-pointer shadow-lg shadow-blue-600/30 flex justify-center items-center gap-2";
        renderSongs();
      };

      document.getElementById("searchInput").oninput = () => {
        currentPage = 1;
        renderSongs();
      };

      document.getElementById("controlStop").onclick = stopVideo;
      
      document.getElementById("mainPlayBtn").onclick = () => {
        const sourceList = activeTab === "popular" ? allSongs : reservedSongs;
        if (sourceList.length > 0) {
          playVideo(sourceList[0].id, sourceList[0].title);
        }
      };

      document.getElementById("controlPlay").onclick = () => {
        if (currentPlayingVid) {
          playVideo(currentPlayingVid, currentPlayingTitle);
        } else {
          const sourceList = activeTab === "popular" ? allSongs : reservedSongs;
          if (sourceList.length > 0) {
            playVideo(sourceList[0].id, sourceList[0].title);
          }
        }
      };

      document.getElementById("controlNext").onclick = () => {
        if (reservedSongs.length > 0) {
          const nextSong = reservedSongs.shift();
          updateReservedBadge();
          playVideo(nextSong.id, nextSong.title);
        } else if (allSongs.length > 0) {
          let currentIndex = allSongs.findIndex(s => s.id === currentPlayingVid);
          let nextIndex = (currentIndex + 1) % allSongs.length;
          playVideo(allSongs[nextIndex].id, allSongs[nextIndex].title);
        }
      };

      document.getElementById("controlFullscreen").onclick = () => {
         toggleFullScreenMode(!isSimulatedFullscreen);
      };

      document.addEventListener("keydown", (e) => {
         const list = activeTab === "popular" ? allSongs : reservedSongs;
         if (list.length === 0) return;

         if (e.key === "ArrowDown") {
             activeIndex = (activeIndex + 1) % list.length;
             const card = songListContainer.children[activeIndex];
             if (card) card.scrollIntoView({ behavior: "smooth", block: "nearest" });
         } else if (e.key === "ArrowUp") {
             activeIndex = (activeIndex - 1 + list.length) % list.length;
             const card = songListContainer.children[activeIndex];
             if (card) card.scrollIntoView({ behavior: "smooth", block: "nearest" });
         } else if (e.key === "Enter") {
             if (activeIndex >= 0 && activeIndex < list.length) {
                 showActionModal(list[activeIndex]);
             }
         }
      });

      loadPlaylistItems();
    </script>
</body>
</html>
